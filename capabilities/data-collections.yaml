naftiko: 1.0.0-alpha2
info:
  label: Sketchfab Data API — Collections
  description: 'Sketchfab Data API — Collections. 3 operations covering listing, creation, and add-model-to-collection. Self-contained Naftiko capability.'
  tags:
  - Sketchfab
  - Collections
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SKETCHFAB_API_TOKEN: SKETCHFAB_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: data-collections
    baseUri: https://api.sketchfab.com
    description: Sketchfab Collections business capability.
    resources:
    - name: v3-collections
      path: /v3/collections
      operations:
      - name: listcollections
        method: GET
        description: List Collections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user
          in: query
          type: string
        - name: cursor
          in: query
          type: string
      - name: createcollection
        method: POST
        description: Create A Collection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: v3-collections-uid-models
      path: /v3/collections/{uid}/models
      operations:
      - name: addmodeltocollection
        method: POST
        description: Add A Model To A Collection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Token {{env.SKETCHFAB_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: data-collections-rest
    port: 8080
    description: REST adapter for Sketchfab Collections.
    resources:
    - path: /v3/v3/collections
      name: v3-collections
      operations:
      - method: GET
        name: listcollections
        description: List Collections
        call: data-collections.listcollections
        with:
          user: rest.user
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcollection
        description: Create A Collection
        call: data-collections.createcollection
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v3/v3/collections/{uid}/models
      name: v3-collections-uid-models
      operations:
      - method: POST
        name: addmodeltocollection
        description: Add A Model To A Collection
        call: data-collections.addmodeltocollection
        with:
          uid: rest.uid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-collections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sketchfab Collections.
    tools:
    - name: sketchfab-list-collections
      description: List Collections
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-collections.listcollections
      with:
        user: tools.user
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: sketchfab-create-collection
      description: Create A Collection
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-collections.createcollection
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: sketchfab-add-model-to-collection
      description: Add A Model To A Collection
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-collections.addmodeltocollection
      with:
        uid: tools.uid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
