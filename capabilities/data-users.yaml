naftiko: 1.0.0-alpha2
info:
  label: Sketchfab Data API — Users
  description: 'Sketchfab Data API — Users. 2 operations covering current-user and public-user retrieval. Self-contained Naftiko capability.'
  tags:
  - Sketchfab
  - Users
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SKETCHFAB_API_TOKEN: SKETCHFAB_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: data-users
    baseUri: https://api.sketchfab.com
    description: Sketchfab Users business capability.
    resources:
    - name: v3-me
      path: /v3/me
      operations:
      - name: getcurrentuser
        method: GET
        description: Retrieve The Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-users-username
      path: /v3/users/{username}
      operations:
      - name: getuser
        method: GET
        description: Retrieve A User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Token {{env.SKETCHFAB_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: data-users-rest
    port: 8080
    description: REST adapter for Sketchfab Users.
    resources:
    - path: /v3/v3/me
      name: v3-me
      operations:
      - method: GET
        name: getcurrentuser
        description: Retrieve The Current User
        call: data-users.getcurrentuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v3/v3/users/{username}
      name: v3-users-username
      operations:
      - method: GET
        name: getuser
        description: Retrieve A User
        call: data-users.getuser
        with:
          username: rest.username
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sketchfab Users.
    tools:
    - name: sketchfab-get-current-user
      description: Retrieve The Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-users.getcurrentuser
      outputParameters:
      - type: object
        mapping: $.
    - name: sketchfab-get-user
      description: Retrieve A User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-users.getuser
      with:
        username: tools.username
      outputParameters:
      - type: object
        mapping: $.
